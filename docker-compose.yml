# ChromaDB runs embedded inside the app (no separate service needed).
# For the full stack in a container: docker compose --profile full up

services:
  app:
    profiles: ["full"]
    build:
      context: .
      args:
        VERSION: ${PRISMA_VERSION:-dev}
    image: prismadb:${PRISMA_VERSION:-latest}
    ports:
      - "8001:8000"
    volumes:
      - app_data:/app/data
    environment:
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-django-insecure-change-me-in-production}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-False}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-*}
      - DJANGO_CSRF_TRUSTED_ORIGINS=${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      - PRISMADB_HOME=/app/data
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  app_data:
