<div class="modal fade" id="textModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content shadow-lg" style="background-color: var(--bg-card); border: 1px solid var(--border);">

      <div class="modal-header py-2 border-bottom border-secondary border-opacity-10">
        <div class="d-flex align-items-center">
          <span class="badge bg-secondary font-monospace me-2" id="modalDocIdBadge">Doc #</span>
          <span class="text-white small opacity-75 fw-bold text-uppercase ls-1">Full Document Content</span>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body p-0 bg-black">
        <div class="p-3">
          <pre id="modalDocText" class="mb-0"
            style="white-space: pre-wrap; font-family: 'Fira Code', monospace; font-size: 0.85rem; color: #d4d4d4; line-height: 1.7;"></pre>
        </div>
      </div>

      <div class="modal-footer py-2 border-top border-secondary border-opacity-10 bg-black bg-opacity-25">
        <a href="#" id="modalDocLink" class="btn btn-sm btn-outline-secondary border-0 text-accent" target="_blank">
          Open in Document Viewer <i class="bi bi-box-arrow-up-right ms-1"></i>
        </a>
        <button type="button" class="btn btn-sm btn-ghost text-muted" data-bs-dismiss="modal">Close</button>
      </div>

    </div>
  </div>
</div>

<!-- Reinterpret Modal -->
<div class="modal fade" id="reinterpretModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg" style="background-color: var(--bg-card); border: 1px solid var(--border);">
      <div class="modal-header border-bottom border-secondary border-opacity-10">
        <h5 class="modal-title text-white h6 text-uppercase ls-1">Re-Interpret Feature</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form method="post" action="{% url 'explorer:reinterpret_feature' run.id feature.feature_index %}">
        {% csrf_token %}
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label small text-muted text-uppercase fw-bold">Ollama Model</label>
            <select name="ollama_model" class="form-select form-select-sm bg-dark text-white border-secondary">
              {% for model in ollama_models %}
              <option value="{{ model }}">
                {{ model }}
              </option>
              {% empty %}
              <option value="qwen2.5:14b">qwen2.5:14b (Default)</option>
              {% endfor %}
            </select>
          </div>

          <div class="row g-2 mb-3">
            <div class="col-6">
              <label class="form-label small text-muted text-uppercase fw-bold">Temp</label>
              <input type="number" step="0.1" min="0" max="1" name="temperature"
                class="form-control form-control-sm bg-dark text-white border-secondary"
                value="{{ current_interp.temperature|default:0.2 }}">
            </div>
            <div class="col-3">
              <label class="form-label small text-muted text-uppercase fw-bold">K+</label>
              <input type="number" name="k_positive"
                class="form-control form-control-sm bg-dark text-white border-secondary" value="6">
            </div>
            <div class="col-3">
              <label class="form-label small text-muted text-uppercase fw-bold">K-</label>
              <input type="number" name="k_negative"
                class="form-control form-control-sm bg-dark text-white border-secondary" value="4">
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label small text-muted text-uppercase fw-bold">System Prompt</label>
            <textarea name="system_prompt" rows="4"
              class="form-control form-control-sm bg-dark text-white border-secondary"
              style="font-size: 0.8rem;">{{ current_interp.system_prompt|default:default_system_prompt }}</textarea>
          </div>
        </div>
        <div class="modal-footer border-top border-secondary border-opacity-10">
          <button type="button" class="btn btn-sm btn-ghost text-muted" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-sm btn-accent">Generate New Interpretation</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // --- Logic for Text Viewer Modal ---
    var textModal = document.getElementById('textModal');
    if (textModal) {
      textModal.addEventListener('show.bs.modal', function (event) {
        var button = event.relatedTarget;
        var fullText = button.getAttribute('data-fulltext');
        var docId = button.getAttribute('data-docid');

        textModal.querySelector('#modalDocText').textContent = fullText;
        textModal.querySelector('#modalDocIdBadge').textContent = "Doc " + docId;

        var linkBtn = textModal.querySelector('#modalDocLink');
        if (linkBtn) {
          linkBtn.href = "/embeddings/document/" + docId + "/";
        }
      });
    }
  });
</script>

<style>
  .focus-accent:focus {
    border-color: var(--accent, #0d6efd) !important;
    box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25) !important;
  }

  .ls-1 {
    letter-spacing: 1px;
  }
</style>
