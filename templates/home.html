{% extends "base.html" %}
{% load static %}

{% block title %}prismadb — Interpretable Feature Database{% endblock %}

{% block extra_head %}
<style>
  /* Fixed viewport — no scroll */
  html { background: var(--bg); }
  html, body { overflow: hidden; height: 100%; }
  body { background: transparent !important; }
  footer { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; }
  main.container-root {
    padding: 0 1.5rem;
    max-width: 100%;
    height: calc(100vh - 60px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  /* Background prism image */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: url("{% static 'prism8x.png' %}");
    background-repeat: no-repeat;
    background-position: center;
    background-size: 75%;
    mask-image: radial-gradient(circle at center,
      rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.5) 20%,
      rgba(0,0,0,0.2) 35%, rgba(0,0,0,0) 55%);
    -webkit-mask-image: radial-gradient(circle at center,
      rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.5) 20%,
      rgba(0,0,0,0.2) 35%, rgba(0,0,0,0) 55%);
    z-index: -1;
  }

  /* Grid overlay */
  .bg-grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(circle at center, black 20%, transparent 70%);
    z-index: -1;
  }

  /* ---- Hero ---- */
  .hero {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .hero-brand {
    font-size: 5rem;
    font-weight: 800;
    letter-spacing: -2px;
    color: var(--text-main);
    margin-bottom: 0.5rem;
  }
  .hero-gradient {
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 0 30px rgba(139,92,246,0.4));
  }
  .hero-tagline {
    font-size: 1.1rem;
    color: var(--text-muted);
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* ---- Sparse vector animation ---- */
  .sparse-strip {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 0.3rem;
    font-family: var(--font-mono);
    font-size: 0.95rem;
    position: relative;
    padding-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    min-height: 110px;
    max-width: 800px;
    width: 100%;
  }
  .val {
    color: rgba(255,255,255,0.15);
    font-weight: 500;
    position: relative;
    width: 13px;
    text-align: center;
    transition: all 0.5s ease;
  }
  .val.active {
    color: #c4b5fd;
    font-weight: 700;
    text-shadow: 0 0 12px var(--accent);
    z-index: 10;
  }
  .spike {
    position: absolute;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    background: var(--gradient-primary);
    border-radius: 3px;
    box-shadow: 0 0 15px var(--accent);
    opacity: 0;
    animation: growUp 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  .spike::after {
    content: attr(data-label);
    position: absolute;
    top: -24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(139,92,246,0.4);
    color: #c4b5fd;
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  @keyframes growUp {
    from { height: 0; opacity: 0; }
    to { opacity: 1; }
  }

  /* ---- Responsive ---- */
  @media (max-width: 768px) {
    .hero { margin-bottom: 1.5rem; }
    .hero-brand { font-size: 2.8rem; letter-spacing: -1px; }
    .hero-tagline { font-size: 0.9rem; max-width: 300px; }
    body::before { background-size: 120%; }
    .sparse-strip {
      font-size: 0.6rem;
      gap: 0.1rem;
      min-height: 70px;
      max-width: 100%;
      overflow: hidden;
    }
    .sparse-strip .val { width: 8px; }
    .spike::after { font-size: 0.45rem; padding: 1px 3px; top: -18px; }
    .spike { width: 2px; }
    footer .container-root { padding: 0.8rem 1rem !important; }
  }
</style>
{% endblock %}

{% block content %}
<div class="bg-grid"></div>

<div class="hero">
  <h1 class="hero-brand">PRISM<span class="hero-gradient">&Delta;</span>DB</h1>
  <p class="hero-tagline">
    The interpretable feature database for LLM embeddings.
  </p>
</div>

<div class="sparse-strip" id="sparse-container"></div>

{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
  const container = document.getElementById('sparse-container');
  const total = window.innerWidth < 768 ? 25 : 38;

  const featureLabels = [
    'Cardiology', 'Pediatrics', 'Neural', 'Genomics',
    'Oncology', 'Immunology', 'Radiology', 'Pathology',
  ];

  const numSpikes = Math.floor(Math.random() * 3) + 3;
  const spikeIndices = new Set();
  while (spikeIndices.size < numSpikes) {
    spikeIndices.add(Math.floor(Math.random() * (total - 6)) + 3);
  }

  let labelIdx = 0;
  for (let i = 0; i < total; i++) {
    const span = document.createElement('span');
    span.classList.add('val');

    if (spikeIndices.has(i)) {
      span.classList.add('active');
      const val = (Math.random() * 0.6 + 0.35).toFixed(2);
      span.innerText = val.substring(0, 3);

      const spike = document.createElement('div');
      spike.classList.add('spike');
      spike.style.height = Math.floor(val * 100) + 'px';
      spike.style.animationDelay = (Math.random() * 0.5).toFixed(2) + 's';
      spike.setAttribute('data-label', featureLabels[labelIdx++ % featureLabels.length]);
      span.appendChild(spike);
    } else {
      span.innerText = '0';
    }
    container.appendChild(span);
  }
});
</script>
{% endblock %}
